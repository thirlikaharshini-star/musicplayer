<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatStream - Premium Music Experience</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-bolt-lightning"></i>
                <h2>BeatStream</h2>
            </div>
            <nav class="nav-menu">
                <a href="#" class="active"><i class="fa-solid fa-house"></i> Discover</a>
                <a href="#"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
                <a href="#"><i class="fa-solid fa-heart"></i> Favorites</a>
                <a href="#"><i class="fa-solid fa-music"></i> Playlists</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="search-bar-container">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="search-input" placeholder="Search for tracks, artists, or albums..." value="The Weeknd">
                    <button id="search-btn">Search</button>
                </div>
            </header>

            <section class="content-section">
                <h2 class="section-title">Trending Results</h2>
                <div class="music-grid" id="music-grid">
                    </div>
            </section>
        </main>

        <footer class="player-bar">
            <div class="current-track-info">
                <img src="https://via.placeholder.com/60" alt="Album Art" id="player-img">
                <div class="track-details">
                    <h4 id="player-title">Select a track</h4>
                    <p id="player-artist">Artist</p>
                </div>
                <button class="fav-btn"><i class="fa-regular fa-heart"></i></button>
            </div>

            <div class="player-controls-container">
                <div class="control-buttons">
                    <button class="ctrl-btn"><i class="fa-solid fa-shuffle"></i></button>
                    <button class="ctrl-btn"><i class="fa-solid fa-backward-step"></i></button>
                    <button class="ctrl-btn play-main" id="play-btn"><i class="fa-solid fa-play"></i></button>
                    <button class="ctrl-btn"><i class="fa-solid fa-forward-step"></i></button>
                    <button class="ctrl-btn"><i class="fa-solid fa-repeat"></i></button>
                </div>
                <div class="progress-container">
                    <span id="current-time">0:00</span>
                    <div class="progress-bar" id="progress-bar-container">
                        <div class="progress" id="progress-fill"></div>
                    </div>
                    <span id="total-time">0:00</span>
                </div>
            </div>

            <div class="volume-container">
                <i class="fa-solid fa-volume-high"></i>
                <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5">
            </div>
        </footer>
    </div>

    <audio id="audio-player"></audio>

    <script src="script.js"></script>
</body>
</html>
